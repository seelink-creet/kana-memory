<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>五十音科学记忆</title>
  <style>
    :root{
      --bg:#0b1020;
      --panel:#121a2e;
      --panel2:#19233b;
      --text:#f8fafc;
      --muted:#94a3b8;
      --accent:#7c3aed;
      --accent2:#22c55e;
      --danger:#ef4444;
      --warn:#f59e0b;
      --line:rgba(255,255,255,.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      background:linear-gradient(180deg,#0b1020 0%,#10182b 100%);
      color:var(--text);
      min-height:100vh;
    }
    button,input,select{font:inherit}
    .app{max-width:720px;margin:0 auto;padding:18px 16px 110px}
    .top{
      position:sticky;top:0;z-index:10;
      margin:-18px -16px 18px;padding:18px 16px 14px;
      background:rgba(11,16,32,.92);backdrop-filter:blur(14px);
      border-bottom:1px solid var(--line)
    }
    h1{font-size:23px;margin:0 0 4px}
    .sub{color:var(--muted);font-size:13px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .card{
      background:linear-gradient(180deg,var(--panel),var(--panel2));
      border:1px solid var(--line);
      border-radius:20px;padding:16px;
      box-shadow:0 14px 28px rgba(0,0,0,.18)
    }
    .stat strong{font-size:24px;display:block}
    .stat span{font-size:12px;color:var(--muted)}
    .section-title{font-size:16px;margin:22px 0 10px}
    .row{display:flex;gap:10px;align-items:center}
    .row.wrap{flex-wrap:wrap}
    .pill{
      border:1px solid var(--line);background:#0f172a;color:var(--text);
      border-radius:999px;padding:9px 13px
    }
    .pill.active{background:var(--accent);border-color:transparent}
    .primary,.secondary,.danger{
      border:0;border-radius:14px;padding:14px 16px;font-weight:700
    }
    .primary{background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:white}
    .secondary{background:#24304b;color:white}
    .danger{background:#4b1f24;color:#fecaca}
    .full{width:100%}
    .lesson{
      display:flex;justify-content:space-between;gap:12px;align-items:center;
      padding:14px 0;border-bottom:1px solid var(--line)
    }
    .lesson:last-child{border-bottom:0}
    .lesson small{color:var(--muted)}
    .progress{height:8px;background:#0f172a;border-radius:999px;overflow:hidden;margin-top:8px}
    .bar{height:100%;background:linear-gradient(90deg,#8b5cf6,#22c55e);width:0%}
    .screen{display:none}
    .screen.active{display:block}
    .study-card{
      min-height:390px;display:flex;flex-direction:column;
      align-items:center;justify-content:center;text-align:center
    }
    .kana{font-size:112px;line-height:1;margin:12px 0 16px}
    .roman{font-size:28px;color:#c4b5fd;margin-bottom:8px}
    .hint{color:var(--muted);min-height:48px}
    .choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-top:16px}
    .choice{
      padding:16px;border-radius:14px;border:1px solid var(--line);
      background:#172036;color:white;font-size:20px
    }
    .choice.correct{background:#14532d}
    .choice.wrong{background:#7f1d1d}
    .feedback{min-height:34px;margin:12px 0;font-weight:700}
    .footer-nav{
      position:fixed;bottom:0;left:0;right:0;background:rgba(11,16,32,.96);
      border-top:1px solid var(--line);backdrop-filter:blur(16px);padding:10px 12px calc(10px + env(safe-area-inset-bottom))
    }
    .footer-inner{max-width:720px;margin:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .navbtn{background:transparent;color:var(--muted);border:0;padding:10px;border-radius:12px}
    .navbtn.active{background:#202b45;color:white}
    .mini{font-size:12px;color:var(--muted)}
    .schedule{display:grid;gap:8px}
    .schedule-item{display:flex;justify-content:space-between;padding:12px;border-radius:14px;background:#111a2d}
    .tag{font-size:12px;padding:4px 8px;border-radius:999px;background:#26324e}
    .hidden{display:none!important}
    .center{text-align:center}
  </style>
</head>
<body>
<div class="app">
  <header class="top">
    <h1>五十音科学记忆</h1>
    <div class="sub">少量分组 · 主动回忆 · 间隔复习 · 错题强化</div>
  </header>

  <main id="home" class="screen active">
    <div class="grid">
      <div class="card stat"><strong id="learnedCount">0</strong><span>已学习假名</span></div>
      <div class="card stat"><strong id="dueCount">0</strong><span>今日待复习</span></div>
      <div class="card stat"><strong id="accuracy">0%</strong><span>累计正确率</span></div>
      <div class="card stat"><strong id="streak">0</strong><span>连续学习天数</span></div>
    </div>

    <h2 class="section-title">今日建议</h2>
    <div class="card">
      <div id="recommendText">先学习 5 个新假名，再完成今日复习。</div>
      <div class="progress"><div class="bar" id="dailyBar"></div></div>
      <div class="mini" id="dailyText" style="margin-top:8px">今日完成 0 / 15 题</div>
      <button class="primary full" style="margin-top:14px" onclick="startRecommended()">开始今日训练</button>
    </div>

    <h2 class="section-title">学习分组</h2>
    <div class="card" id="lessonList"></div>
  </main>

  <main id="study" class="screen">
    <div class="card study-card">
      <div class="mini" id="modeLabel">学习</div>
      <div class="kana" id="kanaDisplay">あ</div>
      <div class="roman hidden" id="romanDisplay">a</div>
      <div class="hint" id="hintText">先观察字形，再尝试回忆读音。</div>
      <div class="feedback" id="feedback"></div>
      <div class="choice-grid" id="choices"></div>
      <button id="revealBtn" class="secondary full" onclick="revealAnswer()">显示答案</button>
      <div class="row full" id="selfButtons" style="margin-top:10px">
        <button class="danger" style="flex:1" onclick="gradeSelf(false)">没记住</button>
        <button class="primary" style="flex:1" onclick="gradeSelf(true)">记住了</button>
      </div>
    </div>
    <div class="row" style="margin-top:12px">
      <button class="secondary" style="flex:1" onclick="exitStudy()">结束</button>
      <div class="card center" style="flex:1;padding:12px"><span id="sessionProgress">1 / 5</span></div>
    </div>
  </main>

  <main id="review" class="screen">
    <h2 class="section-title" style="margin-top:0">复习计划</h2>
    <div class="card schedule" id="scheduleList"></div>
    <h2 class="section-title">错题本</h2>
    <div class="card">
      <div id="wrongList" class="row wrap"></div>
      <button class="primary full" style="margin-top:14px" onclick="startWrongReview()">集中强化错题</button>
    </div>
    <button class="danger full" style="margin-top:18px" onclick="resetData()">清空全部进度</button>
  </main>
</div>

<nav class="footer-nav">
  <div class="footer-inner">
    <button class="navbtn active" onclick="showScreen('home',this)">首页</button>
    <button class="navbtn" onclick="startDueReview()">复习</button>
    <button class="navbtn" onclick="showScreen('review',this)">进度</button>
  </div>
</nav>

<script>
const groups = [
  {name:'あ行', items:[['あ','a'],['い','i'],['う','u'],['え','e'],['お','o']]},
  {name:'か行', items:[['か','ka'],['き','ki'],['く','ku'],['け','ke'],['こ','ko']]},
  {name:'さ行', items:[['さ','sa'],['し','shi'],['す','su'],['せ','se'],['そ','so']]},
  {name:'た行', items:[['た','ta'],['ち','chi'],['つ','tsu'],['て','te'],['と','to']]},
  {name:'な行', items:[['な','na'],['に','ni'],['ぬ','nu'],['ね','ne'],['の','no']]},
  {name:'は行', items:[['は','ha'],['ひ','hi'],['ふ','fu'],['へ','he'],['ほ','ho']]},
  {name:'ま行', items:[['ま','ma'],['み','mi'],['む','mu'],['め','me'],['も','mo']]},
  {name:'や行', items:[['や','ya'],['ゆ','yu'],['よ','yo']]},
  {name:'ら行', items:[['ら','ra'],['り','ri'],['る','ru'],['れ','re'],['ろ','ro']]},
  {name:'わ行', items:[['わ','wa'],['を','wo'],['ん','n']]}
];
const allItems = groups.flatMap(g=>g.items.map(i=>({kana:i[0],roman:i[1],group:g.name})));
const intervals = [10*60*1000, 24*60*60*1000, 3*24*60*60*1000, 7*24*60*60*1000, 14*24*60*60*1000, 30*24*60*60*1000];

let state = JSON.parse(localStorage.getItem('kanaScienceState')||'null') || {
  cards:{}, total:0, correct:0, dailyCount:0, lastStudyDate:'', streak:0
};
let session = [], index = 0, currentMode='learn', revealed=false;

function todayKey(){ return new Date().toISOString().slice(0,10); }
function save(){ localStorage.setItem('kanaScienceState',JSON.stringify(state)); render(); }
function ensureDaily(){
  const t=todayKey();
  if(state.lastStudyDate!==t){
    const y=new Date(); y.setDate(y.getDate()-1);
    const yk=y.toISOString().slice(0,10);
    state.streak = state.lastStudyDate===yk ? state.streak+1 : 0;
    state.dailyCount=0;
  }
}
function card(k){
  if(!state.cards[k]) state.cards[k]={level:0,due:0,wrong:0,seen:false};
  return state.cards[k];
}
function render(){
  ensureDaily();
  const learned=Object.values(state.cards).filter(c=>c.seen).length;
  const due=allItems.filter(i=>card(i.kana).seen && card(i.kana).due<=Date.now()).length;
  document.getElementById('learnedCount').textContent=learned;
  document.getElementById('dueCount').textContent=due;
  document.getElementById('accuracy').textContent=state.total?Math.round(state.correct/state.total*100)+'%':'0%';
  document.getElementById('streak').textContent=state.streak;
  const goal=15, done=Math.min(goal,state.dailyCount||0);
  document.getElementById('dailyBar').style.width=(done/goal*100)+'%';
  document.getElementById('dailyText').textContent=`今日完成 ${done} / ${goal} 题`;
  document.getElementById('recommendText').textContent = due>0 ? `你有 ${due} 个假名到期，优先完成复习。` : learned<allItems.length ? '今天学习 5 个新假名，并穿插旧题。' : '今天完成一次混合复习，保持反应速度。';
  renderLessons(); renderWrong(); renderSchedule();
}
function renderLessons(){
  const box=document.getElementById('lessonList'); box.innerHTML='';
  groups.forEach((g,idx)=>{
    const n=g.items.filter(i=>card(i[0]).seen).length;
    const row=document.createElement('div'); row.className='lesson';
    row.innerHTML=`<div><strong>${g.name}</strong><br><small>${g.items.map(i=>i[0]).join('　')}</small></div>
    <button class="pill ${n===g.items.length?'active':''}" onclick="startGroup(${idx})">${n}/${g.items.length}</button>`;
    box.appendChild(row);
  });
}
function showScreen(id,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
}
function startRecommended(){
  const due=allItems.filter(i=>card(i.kana).seen && card(i.kana).due<=Date.now());
  if(due.length) startSession(due.slice(0,15),'review');
  else{
    const unseen=allItems.filter(i=>!card(i.kana).seen).slice(0,5);
    startSession(unseen.length?unseen:shuffle([...allItems]).slice(0,15), unseen.length?'learn':'review');
  }
}
function startGroup(idx){ startSession(groups[idx].items.map(i=>({kana:i[0],roman:i[1],group:groups[idx].name})),'learn'); }
function startDueReview(){
  const due=allItems.filter(i=>card(i.kana).seen && card(i.kana).due<=Date.now());
  startSession(due.length?due:shuffle(allItems.filter(i=>card(i.kana).seen)).slice(0,10),'review');
}
function startWrongReview(){
  const wrong=allItems.filter(i=>card(i.kana).wrong>0).sort((a,b)=>card(b.kana).wrong-card(a.kana).wrong);
  if(!wrong.length){ alert('目前没有错题。'); return; }
  startSession(wrong.slice(0,15),'review');
}
function startSession(items,mode){
  if(!items.length){ alert('先学习一组假名。'); return; }
  session=shuffle([...items]); index=0; currentMode=mode; showScreen('study');
  nextCard();
}
function nextCard(){
  if(index>=session.length){ alert('本轮训练完成。'); save(); showScreen('home'); return; }
  revealed=false;
  const item=session[index];
  document.getElementById('kanaDisplay').textContent=item.kana;
  document.getElementById('romanDisplay').textContent=item.roman;
  document.getElementById('romanDisplay').classList.add('hidden');
  document.getElementById('feedback').textContent='';
  document.getElementById('sessionProgress').textContent=`${index+1} / ${session.length}`;
  document.getElementById('modeLabel').textContent=currentMode==='learn'?'主动回忆学习':'间隔复习';
  const choices=document.getElementById('choices');
  if(currentMode==='review'){
    choices.classList.remove('hidden');
    document.getElementById('revealBtn').classList.add('hidden');
    document.getElementById('selfButtons').classList.add('hidden');
    const opts=shuffle([item.roman,...shuffle(allItems.filter(x=>x.roman!==item.roman)).slice(0,3).map(x=>x.roman)]);
    choices.innerHTML='';
    opts.forEach(o=>{
      const b=document.createElement('button'); b.className='choice'; b.textContent=o;
      b.onclick=()=>answerChoice(b,o===item.roman);
      choices.appendChild(b);
    });
    document.getElementById('hintText').textContent='请在 1 秒内选出正确读音。';
  }else{
    choices.classList.add('hidden');
    document.getElementById('revealBtn').classList.remove('hidden');
    document.getElementById('selfButtons').classList.add('hidden');
    document.getElementById('hintText').textContent='先自己回忆读音，再显示答案。';
  }
}
function revealAnswer(){
  revealed=true;
  document.getElementById('romanDisplay').classList.remove('hidden');
  document.getElementById('revealBtn').classList.add('hidden');
  document.getElementById('selfButtons').classList.remove('hidden');
  document.getElementById('hintText').textContent='诚实判断：刚才是否在 1 秒内想起来？';
}
function gradeSelf(ok){ grade(ok); }
function answerChoice(btn,ok){
  document.querySelectorAll('.choice').forEach(b=>b.disabled=true);
  btn.classList.add(ok?'correct':'wrong');
  const correctRoman=session[index].roman;
  document.querySelectorAll('.choice').forEach(b=>{ if(b.textContent===correctRoman)b.classList.add('correct'); });
  document.getElementById('feedback').textContent=ok?'正确！':'答错了，正确答案是 '+correctRoman;
  setTimeout(()=>grade(ok),650);
}
function grade(ok){
  const item=session[index], c=card(item.kana);
  c.seen=true; state.total++; state.dailyCount=(state.dailyCount||0)+1; state.lastStudyDate=todayKey();
  if(ok){
    state.correct++; c.level=Math.min(c.level+1,intervals.length); c.due=Date.now()+intervals[Math.max(0,c.level-1)];
    c.wrong=Math.max(0,c.wrong-1);
  }else{
    c.level=0; c.due=Date.now()+10*60*1000; c.wrong++;
    if(currentMode==='review' && session.filter(x=>x.kana===item.kana).length<3) session.push(item);
  }
  index++; save(); nextCard();
}
function renderWrong(){
  const box=document.getElementById('wrongList'); if(!box)return; box.innerHTML='';
  const wrong=allItems.filter(i=>card(i.kana).wrong>0).sort((a,b)=>card(b.kana).wrong-card(a.kana).wrong);
  if(!wrong.length){box.innerHTML='<span class="mini">暂无错题</span>';return}
  wrong.slice(0,20).forEach(i=>{const s=document.createElement('span');s.className='pill';s.textContent=`${i.kana} ${i.roman} ×${card(i.kana).wrong}`;box.appendChild(s)})
}
function renderSchedule(){
  const box=document.getElementById('scheduleList'); if(!box)return; box.innerHTML='';
  const items=allItems.filter(i=>card(i.kana).seen).sort((a,b)=>card(a.kana).due-card(b.kana).due).slice(0,8);
  if(!items.length){box.innerHTML='<div class="mini">还没有学习记录</div>';return}
  items.forEach(i=>{
    const d=card(i.kana).due-Date.now();
    const text=d<=0?'现在':d<3600000?Math.ceil(d/60000)+' 分钟后':d<86400000?Math.ceil(d/3600000)+' 小时后':Math.ceil(d/86400000)+' 天后';
    const row=document.createElement('div');row.className='schedule-item';
    row.innerHTML=`<span><strong>${i.kana}</strong> ${i.roman}</span><span class="tag">${text}</span>`;
    box.appendChild(row);
  });
}
function resetData(){
  if(confirm('确定清空全部学习记录？')){localStorage.removeItem('kanaScienceState');location.reload();}
}
function exitStudy(){ save(); showScreen('home'); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a; }

render();
</script>
</body>
</html>
